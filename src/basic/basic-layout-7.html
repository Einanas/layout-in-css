<!DOCTYPE html>
<!-- <html lang="en"> -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Layout 7</title>
    <link rel="stylesheet" href="../style.css" />
    <style>
      body {
        display: grid;
        grid-template-columns: 1fr 2fr;
        grid-template-rows: 2fr 3fr 1fr;
        gap: 1em;
        grid-template-areas: 
        "nav header"
        "nav main"
        "nav footer";
      }

      header {
        grid-area: header;
        grid-column-start: 2;
        grid-column-end: 3;
        grid-row-start: 1;
      }

      nav {
        grid-area: nav;
        grid-column-start: 1;
        grid-row-start: 1;
      }

      main {
        grid-area: main;
        grid-column-start: 2;
        grid-column-end: 3;
        grid-row-start: 2;
      }

      footer {
        grid-area: footer;
      }
    </style>
  </head>
  <body id="basic-layout-7">
    <header><h1>Basic Layout 7</h1></header>
    <nav><a href="../index.html">Terug naar het overzicht</a></nav>
    <main></main>
    <footer></footer>
  </body>
</html>
