<!DOCTYPE html>
<!-- <html lang="en"> -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Layout 3</title>
    <link rel="stylesheet" href="../style.css" />
    <style>
      body {
        display: grid;
        gap: 1em;
        grid-template-rows: 2fr 1fr;
        grid-template-columns: 1fr 1fr;
        grid-template-areas: 
        "main"
        "footer"
        "header" "nav";
      }

      main {
        grid-area: main;
        grid-column-start: 1;
        grid-column-end: 3;
      }

      footer  {
        grid-area: footer;
        grid-column-start: 1;
        grid-column-end: 3;
        grid-row-start: 2;
        grid-row-end: 3; 
      }

      header {
        grid-area: header;
        grid-row-start: 3;
        grid-row-end: 4;
      }

      nav {
        grid-area: nav;
        grid-row-start: 3;
        grid-row-end: 4;
        grid-column-start: 2;
        grid-column-end: 3;
      }
    </style>
  </head>
  <body id="basic-layout-3">
    <header><h1>Basic Layout 3</h1></header>
    <nav><a href="../index.html">Terug naar het overzicht</a></nav>
    <main>fdnd</main>
    <footer>hva</footer>
  </body>
</html>
